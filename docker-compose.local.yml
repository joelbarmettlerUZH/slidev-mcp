# Full local stack with mkcert TLS via Traefik.
# Prerequisites:
#   mkcert -install
#   mkcert -cert-file certs/local.pem -key-file certs/local-key.pem "$(hostname -I | awk '{print $1}').nip.io"
# Usage: DOMAIN=$(hostname -I | awk '{print $1}').nip.io docker compose -f docker-compose.local.yml up -d

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  mcp-server:
    image: ghcr.io/${GITHUB_REPOSITORY:-joelbarmettler/slidev-mcp}/slidev-mcp-server:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/Dockerfile.mcp
    networks: [web, internal, isolated]
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      DATABASE_URL: postgresql+asyncpg://slidev:${POSTGRES_PASSWORD:-slidev}@postgres:5432/slidev
      SERVER_TRANSPORT: streamable-http
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8000"
      BUILDER_HOST: builder
      BUILDER_PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy
      builder:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mcp.rule=Host(`${DOMAIN:-localhost}`) && PathPrefix(`/mcp`)"
      - "traefik.http.routers.mcp.entrypoints=websecure"
      - "traefik.http.routers.mcp.tls=true"
      - "traefik.http.services.mcp.loadbalancer.server.port=8000"
      - "traefik.http.routers.health.rule=Host(`${DOMAIN:-localhost}`) && Path(`/health`)"
      - "traefik.http.routers.health.entrypoints=websecure"
      - "traefik.http.routers.health.tls=true"
      - "traefik.http.routers.health.service=mcp"
      - "traefik.docker.network=slidev-mcp_web"
    mem_limit: 2g
    cpus: 1.0
    logging: *default-logging
    restart: unless-stopped

  builder:
    build:
      context: ./builder
      dockerfile: Dockerfile
    container_name: builder
    networks: [isolated]
    volumes:
      - slides-data:/data/slides
    user: "1000:1000"
    mem_limit: 2g
    cpus: 2.0
    security_opt:
      - "no-new-privileges:true"
    logging: *default-logging
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    networks: [internal]
    volumes:
      - pg-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: slidev
      POSTGRES_USER: slidev
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-slidev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slidev"]
      interval: 5s
      timeout: 3s
      retries: 5
    mem_limit: 2g
    cpus: 1.0
    logging: *default-logging
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    networks: [web]
    volumes:
      - slides-data:/data/slides:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.slides.rule=Host(`${DOMAIN:-localhost}`) && PathPrefix(`/slides`)"
      - "traefik.http.routers.slides.entrypoints=websecure"
      - "traefik.http.routers.slides.tls=true"
      - "traefik.http.services.slides.loadbalancer.server.port=8080"
    mem_limit: 512m
    cpus: 0.5
    logging: *default-logging
    restart: unless-stopped

  traefik:
    image: traefik:v3.6
    networks: [web]
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--accesslog=true"
      - "--accesslog.format=json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./certs:/certs:ro
      - ./traefik-dynamic.yml:/etc/traefik/dynamic.yml:ro
    mem_limit: 512m
    cpus: 0.5
    logging: *default-logging
    restart: unless-stopped

volumes:
  slides-data:
  pg-data:

networks:
  web:
  internal:
  isolated:
    internal: true
