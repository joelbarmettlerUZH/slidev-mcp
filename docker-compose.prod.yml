# Production stack with Let's Encrypt TLS via Traefik.
# Usage: DOMAIN=slides.example.com ACME_EMAIL=you@example.com POSTGRES_PASSWORD=secret docker compose -f docker-compose.prod.yml up -d

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  mcp-server:
    image: ghcr.io/${GITHUB_REPOSITORY:-joelbarmettleruzh/slidev-mcp}/slidev-mcp-server:${IMAGE_TAG:-latest}
    networks: [web, internal, isolated]
    environment:
      DOMAIN: ${DOMAIN}
      SLIDES_DOMAIN: ${SLIDES_DOMAIN:-}
      DATABASE_URL: postgresql+asyncpg://slidev:${POSTGRES_PASSWORD}@postgres:5432/slidev
      SERVER_TRANSPORT: streamable-http
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8000"
      BUILDER_HOST: builder
      BUILDER_PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy
      builder:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mcp.rule=Host(`${DOMAIN}`) && PathPrefix(`/mcp`)"
      - "traefik.http.routers.mcp.entrypoints=websecure"
      - "traefik.http.routers.mcp.tls.certresolver=le"
      - "traefik.http.services.mcp.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.mcp-rate.ratelimit.average=60"
      - "traefik.http.middlewares.mcp-rate.ratelimit.burst=10"
      - "traefik.http.routers.mcp.middlewares=mcp-rate"
      - "traefik.http.routers.health.rule=Host(`${DOMAIN}`) && Path(`/health`)"
      - "traefik.http.routers.health.entrypoints=websecure"
      - "traefik.http.routers.health.tls.certresolver=le"
      - "traefik.http.routers.health.service=mcp"
      - "traefik.docker.network=slidev-mcp_web"
    mem_limit: 2g
    cpus: 1.0
    logging: *default-logging
    restart: unless-stopped

  builder:
    image: ghcr.io/${GITHUB_REPOSITORY:-joelbarmettleruzh/slidev-mcp}/slidev-mcp-builder:${IMAGE_TAG:-latest}
    container_name: builder
    networks: [isolated, builder-egress]
    volumes:
      - slides-data:/data/slides
    user: "1000:1000"
    mem_limit: 6g
    cpus: 2.0
    security_opt:
      - "no-new-privileges:true"
    logging: *default-logging
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    networks: [internal]
    volumes:
      - pg-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: slidev
      POSTGRES_USER: slidev
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slidev"]
      interval: 5s
      timeout: 3s
      retries: 5
    mem_limit: 2g
    cpus: 1.0
    logging: *default-logging
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    networks: [web]
    volumes:
      - slides-data:/data/slides:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.slides.rule=Host(`${SLIDES_DOMAIN:-${DOMAIN}}`) && PathPrefix(`/slides`)"
      - "traefik.http.routers.slides.entrypoints=websecure"
      - "traefik.http.routers.slides.tls.certresolver=le"
      - "traefik.http.services.slides.loadbalancer.server.port=8080"
    mem_limit: 512m
    cpus: 0.5
    logging: *default-logging
    restart: unless-stopped

  traefik:
    image: traefik:v3.6
    networks: [web]
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/certs/acme.json"
      - "--accesslog=true"
      - "--accesslog.format=json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/certs
    mem_limit: 512m
    cpus: 0.5
    logging: *default-logging
    restart: unless-stopped

volumes:
  slides-data:
  pg-data:
  traefik-certs:

networks:
  web:
  internal:
  isolated:
    internal: true
  builder-egress:
    # Outbound internet for builder (fonts, images during Playwright export).
    # Builder has no exposed ports — only outbound connections are possible.
